# ===============================
# PERFIL PROD - PostgreSQL (Railway)
# Todos los valores sensibles vienen de variables de entorno.
# ===============================

# Puerto: Railway inyecta la variable PORT
server.port=${PORT:8080}

# DATASOURCE POSTGRESQL
# En Railway, referencia las variables del plugin Postgres (ver .env.example).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurant_rate_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# POOL DE CONEXIONES (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# FLYWAY (migraciones de esquema)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JPA HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# En produccion NO se altera el esquema automaticamente: se valida contra las migraciones.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# LOGGING
logging.level.root=INFO
logging.level.com.chiris.app=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
