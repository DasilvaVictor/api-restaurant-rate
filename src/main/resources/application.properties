spring.application.name=restaurant_rate

# ===============================
# PERFIL ACTIVO
# Por defecto "dev". En produccion establecer SPRING_PROFILES_ACTIVE=prod
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# JWT CONFIG (externalizado)
# El secreto DEBE proveerse por variable de entorno en produccion.
# ===============================
jwt.secret=${JWT_SECRET:MiClaveSuperSeguraDeMinimo32Caracteres123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# ADMIN POR DEFECTO
# Se crea al arrancar si no existe. En produccion sobreescribir por entorno.
# ===============================
app.admin.nombre=${ADMIN_NOMBRE:Victor}
app.admin.email=${ADMIN_EMAIL:chirinosdasilva@gmail.com}
app.admin.password=${ADMIN_PASSWORD:FluyMilan!}

# ===============================
# MANEJO DE ERRORES (no filtrar detalles internos)
# ===============================
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.error.include-binding-errors=never
spring.web.error.include-exception=false

# ===============================
# APAGADO ORDENADO (graceful shutdown)
# ===============================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===============================
# COMPRESION HTTP
# ===============================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ===============================
# ACTUATOR (health checks / readiness / liveness)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
