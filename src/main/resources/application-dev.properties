# ===============================
# PERFIL DEV - Base de datos H2 en memoria
# ===============================

# DATASOURCE H2
spring.datasource.url=jdbc:h2:mem:restaurant_rate_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Consola H2 (solo en dev)
spring.h2.console.enabled=true

# Flyway desactivado en dev: el esquema lo maneja Hibernate (ddl-auto=update)
spring.flyway.enabled=false

# JPA HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LOGGING
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
